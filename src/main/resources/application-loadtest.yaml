spring:
  datasource:
    url: jdbc:h2:mem:gestao_servicos_loadtest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: false

  sql:
    init:
      mode: always
      schema-locations: classpath:loadtest-schema.sql
      data-locations: classpath:data-loadtest.sql

  mail:
    host: localhost
    port: 1025

notification:
  email:
    from: no-reply@loadtest.local

scheduler:
  lembrete:
    delay: 3600000
