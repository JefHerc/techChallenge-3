spring:
  application:
    name: gestao-servicos

  datasource:
    url: jdbc:mysql://localhost:3306/gestao_servicos?createDatabaseIfNotExist=true
    username: gestao_servicos
    password: gestao_servico
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  jackson:
    deserialization:
      accept-single-value-as-array: true

  sql:
    init:
      mode: always

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}

notification:
  email:
    from: ${NOTIFICATION_EMAIL_FROM:no-reply@gestao-servicos.local}

scheduler:
  lembrete:
    delay: ${SCHEDULER_LEMBRETE_DELAY:300000}

springdoc:
  group-configs:
    - group: clientes
      display-name: Clientes
      paths-to-match:
        - /clientes/**
    - group: estabelecimentos
      display-name: Estabelecimentos e Catalogo
      paths-to-match:
        - /estabelecimentos/**
    - group: agenda
      display-name: Agenda e Avaliacoes
      paths-to-match:
        - /agendamentos/**
        - /estabelecimentos/*/agendamentos/**
        - /agendamentos/*/avaliacoes/**
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    urls-primary-name: clientes
    operations-sorter: method
    tags-sorter: alpha
