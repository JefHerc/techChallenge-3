spring:
  application:
    name: gestao-servicos

  datasource:
    url: jdbc:mysql://localhost:3306/gestao_servicos?createDatabaseIfNotExist=true
    username: gestao_servicos
    password: gestao_servico
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
